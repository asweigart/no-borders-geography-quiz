<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>No Borders Geography Quiz</title>
<style>
  :root {
    --ocean: #16335a;
    --ocean-stroke: rgba(120, 170, 230, 0.25);
    --land: #3d6b48;
    --rivers: rgba(120, 170, 230, 0.55);
    --hl-stroke: #7ec8ff;
    --hl-fill: rgba(120, 200, 255, 0.22);
    --clicked-stroke: #ffd54a;
    --clicked-fill: rgba(255, 213, 74, 0.28);
    --correct-stroke: #7adba0;
    --correct-fill: rgba(120, 220, 150, 0.22);
  }
  #globe path.layer-ocean { fill: var(--ocean); stroke: var(--ocean-stroke); stroke-width: 0.6; }
  #globe path.layer-land { fill: var(--land); stroke: none; }
  #globe path.layer-lakes { fill: var(--ocean); stroke: var(--ocean-stroke); stroke-width: 0.4; }
  #globe path.layer-rivers { fill: none; stroke: var(--rivers); stroke-width: 0.6; stroke-linejoin: round; stroke-linecap: round; }
  #globe path.info-hit { fill: var(--hl-fill); stroke: var(--hl-stroke); stroke-width: 1.5; stroke-linejoin: round; }
  #globe path.reveal-clicked { fill: var(--clicked-fill); stroke: var(--clicked-stroke); stroke-width: 1.5; stroke-linejoin: round; }
  #globe path.reveal-correct { fill: var(--correct-fill); stroke: var(--correct-stroke); stroke-width: 1.5; stroke-linejoin: round; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #050912;
    color: #e8eef8;
    user-select: none;
    -webkit-user-select: none;
  }
  #globe { display: block; width: 100vw; height: 100vh; cursor: grab; touch-action: none; }
  #globe.dragging { cursor: grabbing; }
  #globe.info-mode { cursor: crosshair; }

  #hud {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    z-index: 10; pointer-events: none;
  }
  #prompt-card {
    background: rgba(8, 14, 28, 0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 14px 28px;
    min-width: 260px;
    max-width: 90vw;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    transition: border-color 0.2s;
  }
  #prompt-card.revealing { border-color: rgba(255, 213, 74, 0.6); }
  #prompt-card.info { border-color: rgba(120, 180, 255, 0.4); }
  #prompt-card.tour { border-color: rgba(120, 220, 255, 0.5); }
  #prompt-card.show-all { border-color: rgba(180, 220, 170, 0.5); }
  #prompt-card.hidden-card { display: none; }
  #prompt-label {
    font-size: 11px; opacity: 0.55; text-transform: uppercase;
    letter-spacing: 1.5px; margin-bottom: 6px;
  }
  #prompt-name { font-size: 22px; font-weight: 600; line-height: 1.2; min-height: 26px; }
  #prompt-meta { font-size: 13px; opacity: 0.7; margin-top: 4px; min-height: 18px; }

  #settings-btn {
    position: fixed; top: 20px; right: 20px; z-index: 20;
    width: 44px; height: 44px; border-radius: 50%;
    background: rgba(8, 14, 28, 0.85);
    color: #e8eef8;
    border: 1px solid rgba(255,255,255,0.08);
    cursor: pointer;
    font-size: 22px;
    line-height: 1;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    transition: background 0.15s;
  }
  #settings-btn:hover { background: rgba(40, 60, 100, 0.9); }

  #help-hint {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    z-index: 10; pointer-events: none;
    font-size: 11px; opacity: 0.45; letter-spacing: 0.5px;
    text-align: center;
  }
  body.hover-mode #help-hint,
  body.hover-mode #credit { display: none; }
  #credit {
    position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
    z-index: 10;
    font-size: 10px; opacity: 0.55; letter-spacing: 0.3px;
    text-align: center;
  }
  #credit a { color: inherit; text-decoration: underline; }
  #credit a:hover { color: #8ab4f8; opacity: 1; }

  #settings-panel {
    position: fixed; top: 0; right: 0; height: 100vh; width: 360px; max-width: 90vw;
    background: rgba(5, 10, 22, 0.96);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-left: 1px solid rgba(255,255,255,0.08);
    padding: 20px 24px;
    overflow-y: auto;
    transform: translateX(100%);
    transition: transform 0.28s ease;
    z-index: 30;
  }
  #settings-panel.open { transform: translateX(0); }

  .settings-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 24px;
  }
  .settings-header h2 { margin: 0; font-size: 18px; font-weight: 600; }
  #close-settings {
    background: none; border: none; color: #e8eef8;
    font-size: 28px; cursor: pointer; line-height: 1; padding: 0 4px;
  }

  details.group { margin-bottom: 22px; }
  details.group > summary.group-label {
    list-style: none;
    display: flex; align-items: center; gap: 8px;
    cursor: pointer; user-select: none;
    font-size: 11px; opacity: 0.55;
    text-transform: uppercase; letter-spacing: 1.5px;
    margin-bottom: 8px;
    padding: 2px 0;
    transition: opacity 0.15s;
  }
  details.group > summary.group-label:hover { opacity: 0.85; }
  details.group > summary.group-label::-webkit-details-marker { display: none; }
  details.group > summary.group-label::before {
    content: "▸";
    font-size: 9px;
    width: 10px;
    flex: 0 0 auto;
  }
  details.group[open] > summary.group-label::before { content: "▾"; }
  details.group:not([open]) > summary.group-label { margin-bottom: 0; }

  select {
    width: 100%; padding: 9px 10px; font-size: 14px;
    background: rgba(255,255,255,0.04);
    color: #e8eef8;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 7px;
    font-family: inherit;
    cursor: pointer;
  }

  .mode-tabs { display: flex; flex-direction: column; gap: 6px; }
  .mode-row { display: flex; gap: 6px; }
  .mode-tab {
    flex: 1; padding: 9px 10px; font-size: 14px;
    background: rgba(255,255,255,0.04);
    color: #e8eef8;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 7px;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .mode-tab:hover { background: rgba(255,255,255,0.08); }
  .mode-tab.active {
    background: rgba(80, 130, 230, 0.25);
    border-color: rgba(80, 130, 230, 0.7);
  }
  .mode-tab.active[data-action="tour"] {
    background: rgba(120, 220, 255, 0.18);
    border-color: rgba(120, 220, 255, 0.6);
  }
  .mode-tab.active[data-action="show-all"] {
    background: rgba(180, 220, 170, 0.18);
    border-color: rgba(180, 220, 170, 0.6);
  }

  .master-toggle {
    display: flex; align-items: center; gap: 10px;
    cursor: pointer; padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    margin-bottom: 10px;
    font-size: 14px; font-weight: 600;
  }

  .continent { margin-bottom: 4px; }
  .continent-header {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 0;
  }
  .continent-toggle {
    background: none; border: none; color: #aab4c8;
    cursor: pointer; width: 18px; padding: 0;
    font-size: 11px;
  }
  .continent-label {
    flex: 1; display: flex; align-items: center; gap: 8px;
    cursor: pointer; font-size: 14px;
  }
  .subregion-list { margin-left: 26px; display: none; padding-bottom: 4px; }
  .continent.expanded .subregion-list { display: block; }
  .subregion {
    display: flex; align-items: center; gap: 8px;
    cursor: pointer; padding: 3px 0;
    font-size: 13px; opacity: 0.9;
  }

  input[type="checkbox"] {
    accent-color: #5a8be6;
    width: 15px; height: 15px;
    cursor: pointer;
  }

  .find-wrapper { position: relative; }
  #find-input {
    width: 100%; padding: 9px 10px; font-size: 14px;
    background: rgba(255,255,255,0.04);
    color: #e8eef8;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 7px;
    font-family: inherit;
    outline: none;
  }
  #find-input:focus { border-color: rgba(80, 130, 230, 0.7); }
  #find-results {
    list-style: none; margin: 4px 0 0; padding: 4px 0;
    background: rgba(15, 22, 38, 0.98);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 7px;
    max-height: 300px; overflow-y: auto;
    position: absolute; left: 0; right: 0; top: 100%;
    z-index: 5;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }
  #find-results li {
    padding: 7px 10px; cursor: pointer;
    font-size: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  #find-results li.active { background: rgba(80, 130, 230, 0.22); }
  #find-results li:hover { background: rgba(80, 130, 230, 0.16); }
  #find-results .type-badge {
    font-size: 10px; opacity: 0.45; text-transform: uppercase;
    margin-left: auto; letter-spacing: 0.5px;
  }
  #find-results .find-name { flex: 1; }

  .color-input {
    width: 100%; height: 40px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 7px;
    cursor: pointer;
    padding: 4px;
  }
  .color-row {
    display: flex; align-items: center; gap: 12px;
    padding: 4px 0;
    font-size: 13px;
  }
  .color-row > span { flex: 1; }
  .color-row .color-input { width: 60px; height: 28px; padding: 2px; flex: 0 0 auto; }

  .scheme-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-bottom: 14px;
  }
  .scheme-btn {
    display: flex; flex-direction: column; align-items: stretch; gap: 4px;
    padding: 6px;
    background: rgba(255,255,255,0.04);
    color: #e8eef8;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    transition: background 0.15s, border-color 0.15s;
  }
  .scheme-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.25); }
  .scheme-preview {
    display: flex; height: 14px; border-radius: 3px; overflow: hidden;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .scheme-preview span { flex: 1; }

  .control-toggle {
    display: flex; align-items: center; gap: 10px;
    cursor: pointer; padding: 6px 0;
    font-size: 14px;
  }

  #loading {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #050912;
    z-index: 100;
    font-size: 14px; opacity: 0.7;
  }
</style>
</head>
<body>
  <div id="loading">Loading globe data…</div>

  <svg id="globe"></svg>

  <div id="hud">
    <div id="prompt-card">
      <div id="prompt-label">Click on</div>
      <div id="prompt-name">—</div>
      <div id="prompt-meta"></div>
    </div>
  </div>

  <div id="help-hint">Drag to spin · Scroll to zoom · WASD / arrows to pan · + / − to zoom · 0 to reset</div>

  <div id="credit">
    Generated by <a href="https://inventwithpython.com" target="_blank" rel="noopener">Al Sweigart</a>
    · This app works offline. Save it as a .html file.
  </div>

  <button id="settings-btn" aria-label="Settings" title="Settings">⚙</button>

  <aside id="settings-panel" aria-hidden="true">
    <div class="settings-header">
      <h2>Settings</h2>
      <button id="close-settings" aria-label="Close">×</button>

    <details class="group" open>

      <summary class="group-label">Mode</summary>
      <div class="mode-tabs">

        <button class="mode-tab" data-action="show-all">Show All</button>

    </details>

    <details class="group">
      <summary class="group-label">Language</summary>
      <select id="language-select">

    <details class="group">
      <summary class="group-label">Colors</summary>

            <span style="background:#e8e4d8"></span><span style="background:#b9d6e8"></span><span style="background:#c9b88c"></span><span style="background:#d4861c"></span>
          </span>Daylight
        </button>
        <button class="scheme-btn" data-scheme="parchment">
          <span class="scheme-preview">
            <span style="background:#2a1f15"></span><span style="background:#3a4a5c"></span><span style="background:#d4a373"></span><span style="background:#b03020"></span>
          </span>Parchment
        </button>
        <button class="scheme-btn" data-scheme="neon">
          <span class="scheme-preview">
            <span style="background:#0a0014"></span><span style="background:#0d1a3a"></span><span style="background:#143a3a"></span><span style="background:#ff2dc8"></span>
          </span>Neon
        </button>
        <button class="scheme-btn" data-scheme="mono">
          <span class="scheme-preview">
            <span style="background:#0d0d0d"></span><span style="background:#1f1f1f"></span><span style="background:#4a4a4a"></span><span style="background:#ffffff"></span>
          </span>Mono
        </button>
        <button class="scheme-btn" data-scheme="sunset">
          <span class="scheme-preview">
            <span style="background:#1f0d18"></span><span style="background:#3a2433"></span><span style="background:#8b4a3a"></span><span style="background:#ffe45c"></span>
          </span>Sunset
        </button>
      </div>
      <label class="color-row"><span>Background</span>
        <input type="color" id="bg-color" value="#050912" class="color-input">
      </label>
      <label class="color-row"><span>Land</span>
        <input type="color" id="land-color" value="#3d6b48" class="color-input">
      </label>
      <label class="color-row"><span>Ocean</span>
        <input type="color" id="ocean-color" value="#16335a" class="color-input">
      </label>
      <label class="color-row"><span>Rivers</span>
        <input type="color" id="river-color" value="#78aae6" class="color-input">
      </label>
      <label class="color-row"><span>Highlight</span>
        <input type="color" id="highlight-color" value="#7ec8ff" class="color-input">
      </label>
      <label class="color-row"><span>Clicked country</span>
        <input type="color" id="clicked-color" value="#ffd54a" class="color-input">
      </label>
      <label class="color-row"><span>Correct country</span>
        <input type="color" id="correct-color" value="#7adba0" class="color-input">
      </label>
    </details>

    <details class="group">
      <summary class="group-label">Options</summary>
      <label class="control-toggle">
        <input type="checkbox" id="rivers-toggle" checked>
        <span>Rivers</span>
      </label>
      <label class="control-toggle">
        <input type="checkbox" id="water-grid-toggle" checked>
        <span>Water Grid</span>
      </label>
      <label class="control-toggle">
        <input type="checkbox" id="long-lat-toggle">
        <span>Long Lat Grid</span>
      </label>
      <label class="control-toggle">
        <input type="checkbox" id="invert-h" checked>
        <span>Invert Horizontal</span>
      </label>
      <label class="control-toggle">
        <input type="checkbox" id="invert-v" checked>
        <span>Invert Vertical</span>
      </label>
    </details>
  </aside>

  <script src="d3.v7.min.js"></script>
  <script>window.d3 || document.write('<script src="https://cdn.jsdelivr.net/npm/d3@7"><\/script>');</script>
  <script src="topojson-client.v3.min.js"></script>
  <script>window.topojson || document.write('<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"><\/script>');</script>
  <script>
  (async function () {
    "use strict";

    const REVEAL_MS = 1800;
    const ROTATE_DEFAULT = [-10, -20];
    const US_ROTATE = [98.5, -39.8];
    const US_SCALE_MULT = 2.5;
    const DRAG_THRESHOLD_PX = 4;

    const KEY_ROTATE_DEG_PER_SEC = 75;
    const KEY_ZOOM_PER_SEC = 1.9;
    const WHEEL_ZOOM_SENSITIVITY = 0.0009;

    const STATE_CAPITALS = {
      "Alabama": "Montgomery", "Alaska": "Juneau", "Arizona": "Phoenix",
      "Arkansas": "Little Rock", "California": "Sacramento", "Colorado": "Denver",
      "Connecticut": "Hartford", "Delaware": "Dover", "Florida": "Tallahassee",
      "Georgia": "Atlanta", "Hawaii": "Honolulu", "Idaho": "Boise",
      "Illinois": "Springfield", "Indiana": "Indianapolis", "Iowa": "Des Moines",
      "Kansas": "Topeka", "Kentucky": "Frankfort", "Louisiana": "Baton Rouge",
      "Maine": "Augusta", "Maryland": "Annapolis", "Massachusetts": "Boston",
      "Michigan": "Lansing", "Minnesota": "Saint Paul", "Mississippi": "Jackson",
      "Missouri": "Jefferson City", "Montana": "Helena", "Nebraska": "Lincoln",
      "Nevada": "Carson City", "New Hampshire": "Concord", "New Jersey": "Trenton",
      "New Mexico": "Santa Fe", "New York": "Albany", "North Carolina": "Raleigh",
      "North Dakota": "Bismarck", "Ohio": "Columbus", "Oklahoma": "Oklahoma City",
      "Oregon": "Salem", "Pennsylvania": "Harrisburg", "Rhode Island": "Providence",
      "South Carolina": "Columbia", "South Dakota": "Pierre", "Tennessee": "Nashville",
      "Texas": "Austin", "Utah": "Salt Lake City", "Vermont": "Montpelier",
      "Virginia": "Richmond", "Washington": "Olympia", "West Virginia": "Charleston",
      "Wisconsin": "Madison", "Wyoming": "Cheyenne",
      "District of Columbia": "Washington",
      "Puerto Rico": "San Juan",
      "American Samoa": "Pago Pago",
      "Guam": "Hagåtña",
      "Commonwealth of the Northern Mariana Islands": "Saipan",
      "United States Virgin Islands": "Charlotte Amalie"
    };

    // ---- SVG setup ----
    const svgEl = document.getElementById("globe");
    const svg = d3.select(svgEl);
    let width = window.innerWidth;
    let height = window.innerHeight;
    svg.attr("width", width).attr("height", height);

    const initialScale = Math.min(width, height) * 0.44;
    const projection = d3.geoOrthographic()
      .scale(initialScale)
      .translate([width / 2, height / 2])
      .rotate(ROTATE_DEFAULT)
      .clipAngle(90);
    const path = d3.geoPath(projection);

    const oceanPath = svg.append("path")
      .datum({ type: "Sphere" })
      .attr("class", "layer-ocean");

    const graticulePath = svg.append("path")
      .datum(d3.geoGraticule10())
      .attr("fill", "none")
      .attr("stroke", "rgba(255,255,255,0.06)")
      .attr("stroke-width", 0.5);

    const landPath = svg.append("path").attr("class", "layer-land");

    const lakesPath = svg.append("path").attr("class", "layer-lakes");

    const riversPath = svg.append("path").attr("class", "layer-rivers");

    // Long/lat overlay grid + labels (off by default)
    const longLatGraticule = d3.geoGraticule().step([30, 30])();
    const longLatGridPath = svg.append("path")
      .datum(longLatGraticule)
      .attr("fill", "none")
      .attr("stroke", "rgba(220, 240, 255, 0.32)")
      .attr("stroke-width", 0.6)
      .attr("stroke-dasharray", "2,3")
      .style("display", "none");

    const bordersLayer = svg.append("g").attr("id", "borders-layer");
    const revealLayer = svg.append("g").attr("id", "reveal-layer");

    // Long/lat label points (every 30°, plus poles); rendered as text overlays
    const longLatPoints = [];
    for (let lon = -180; lon < 180; lon += 30) {
      for (let lat = -60; lat <= 60; lat += 30) {
        longLatPoints.push([lon, lat]);
      }
    }
    longLatPoints.push([0, 90]);
    longLatPoints.push([0, -90]);

    function fmtLatLon([lon, lat]) {
      if (lat === 90) return "N";
      if (lat === -90) return "S";
      const latStr = lat > 0 ? `${lat}°N` : lat < 0 ? `${-lat}°S` : "0°";
      const lonStr = lon > 0 ? `${lon}°E` : lon < 0 ? `${-lon}°W` : "0°";
      return `${latStr} ${lonStr}`;
    }

    const longLatLabels = svg.append("g")
      .attr("id", "long-lat-labels")
      .style("display", "none")
      .style("pointer-events", "none");
    longLatLabels.selectAll("text")
      .data(longLatPoints)
      .enter().append("text")
      .text(fmtLatLon)
      .attr("fill", "rgba(220, 240, 255, 0.85)")
      .attr("font-size", 10)
      .attr("font-family", "sans-serif")
      .attr("text-anchor", "middle")
      .attr("dominant-baseline", "central")
      .attr("paint-order", "stroke")
      .attr("stroke", "rgba(5, 10, 22, 0.85)")
      .attr("stroke-width", 2.5);

    let showLongLat = false;
    function updateLongLatLabels() {
      if (!showLongLat) return;
      const r = projection.rotate();
      const center = [-r[0], -r[1]];
      longLatLabels.selectAll("text").each(function (d) {
        const t = d3.select(this);
        if (d3.geoDistance(d, center) > Math.PI / 2 - 0.05) {
          t.style("display", "none");
        } else {
          const xy = projection(d);

            .attr("x", xy[0])

        currentLOD = "lo";
        landPath.datum(landGeoLo);
      }
    }

      })
      .on("drag", (event) => {
        const k = 70 / projection.scale();
        const r = projection.rotate();
        const newLat = Math.max(-90, Math.min(90, r[1] - event.dy * k));
        projection.rotate([r[0] + event.dx * k, newLat]);
        render();
        if ((mode === "info" || mode === "show-all") && IS_TOUCH) updateInfo();
        if (!pressMoved && pressStart) {
          if (Math.hypot(event.x - pressStart[0], event.y - pressStart[1]) > DRAG_THRESHOLD_PX) {
            pressMoved = true;
          }
        }

    function computeView(features) {
      const fc = { type: "FeatureCollection", features };
      const [[lon0, lat0], [lon1, lat1]] = d3.geoBounds(fc);
      const center = d3.geoCentroid(fc);
      const spanLon = Math.abs(lon1 - lon0);
      const spanLat = Math.abs(lat1 - lat0);
      const span = Math.max(spanLon, spanLat * 1.4);
      const K = 150;
      const scale = Math.max(initialScale, Math.min(initialScale * 8, initialScale * (K / Math.max(span, 18))));
      return { rotate: [-center[0], -center[1]], scale };
    }

    // Reverse polygon ring winding in-place. d3 uses spherical geometry where
    // backwards-wound rings get interpreted as covering the rest of the globe,
    // which breaks geoContains and geoBounds. Some source files (e.g.,
    // geoBoundaries ESP ADM1) have the opposite winding convention.
    function reverseRings(geom) {
      if (!geom) return;
      if (geom.type === "Polygon") {
        geom.coordinates = geom.coordinates.map(r => r.slice().reverse());
      } else if (geom.type === "MultiPolygon") {
        geom.coordinates = geom.coordinates.map(p => p.map(r => r.slice().reverse()));
      }
    }

    function registerSubdivision(key, opts) {
      const entry = {
        label: opts.label,
        ready: false,
        flag: opts.flag,
        capitals: opts.capitals,
      };
      entry.load = async () => {
        const geo = await loadJson(opts.localPath, opts.cdnUrl);
        const nameKey = opts.nameKey || "name";
        const filter = opts.filter || (() => true);
        const overrides = opts.nameOverrides || null;
        const clean = opts.nameClean || ((n) => n);
        entry.features = geo.features
          .filter(filter)
          .map(f => {
            const rawName = clean((f.properties[nameKey] || "").trim());
            const name = (overrides && overrides[rawName]) || rawName;
            f.properties = {
              ...f.properties,
              displayName: name,
              flag: entry.flag,
              capital: entry.capitals[name] || entry.capitals[rawName] || "",
            };
            if (opts.reverseWinding) reverseRings(f.geometry);
            return f;
          });
        // Defence in depth: if geoBounds reports the whole globe, the polygon
        // rings are wound the wrong way (a spherical-geometry artifact). Flip
        // every feature and retry. Catches sources we didn't pre-flag.
        if (entry.features.length) {
          const fc = { type: "FeatureCollection", features: entry.features };
          const [[lo0, la0], [lo1, la1]] = d3.geoBounds(fc);
          if (Math.abs(lo1 - lo0) > 359 && Math.abs(la1 - la0) > 179) {
            for (const f of entry.features) reverseRings(f.geometry);
          }
        }
        entry.borderCollection = { type: "FeatureCollection", features: entry.features };
        const viewFeatures = opts.viewFilter
          ? entry.features.filter(opts.viewFilter)
          : entry.features;
        entry.view = computeView(viewFeatures.length ? viewFeatures : entry.features);
        for (const f of entry.features) {
          searchIndex.push({
            label: f.properties.displayName,
            type: opts.searchType,
            feature: f,
          });
        }
        entry.ready = true;
      };
      datasets.set(key, entry);
    }

    const datasetSelect = document.getElementById("dataset-select");
    // Populate the dropdown from the registry in insertion order.
    for (const [key, entry] of datasets) {
      const opt = document.createElement("option");
      opt.value = key;
      opt.textContent = entry.label;
      datasetSelect.appendChild(opt);
    }

    const TOUR_INTERVAL_MS = 4000;
    let tourTimer = null;
    let tourBag = [];

    const promptCard = document.getElementById("prompt-card");
    const promptLabel = document.getElementById("prompt-label");
    const promptName = document.getElementById("prompt-name");
    const promptMeta = document.getElementById("prompt-meta");

    function datasetFeatures() {
      return datasets.get(dataset)?.features || [];
    }

    function filteredPool() {
      return datasetFeatures().slice();
    }

    function rebuildPool() {
      pool = filteredPool();
      bag = [];
      target = null;
      nextTarget();
    }

    function nextTarget() {
      if (mode !== "quiz") return;
      if (pool.length === 0) {
        target = null;
        promptLabel.textContent = "—";
        promptName.textContent = "No regions selected";
        promptMeta.textContent = "Open settings to enable some.";
        return;
      }
      if (bag.length === 0) {
        bag = pool.slice();
        for (let i = bag.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [bag[i], bag[j]] = [bag[j], bag[i]];
        }
        if (target && bag.length > 1 && bag[0] === target) {
          [bag[0], bag[1]] = [bag[1], bag[0]];
        }
      }
      target = bag.shift();
      showInfo("Click on", target);
    }

    function showInfo(labelText, feature) {
      promptCard.classList.remove("hidden-card");
      promptLabel.textContent = labelText;
      const flag = feature.properties.flag || "";
      promptName.textContent = `${flag} ${feature.properties.displayName}`.trim();
      const cap = feature.properties.capital;
      promptMeta.textContent = cap ? `Capital: ${cap}` : "";
    }

    function showEmpty(labelText, hint) {
      promptLabel.textContent = labelText;
      promptName.textContent = hint || "—";
      promptMeta.textContent = "";
    }

    function handleClick(svgX, svgY) {
      if (mode !== "quiz" || revealing || !target) return;
      const coords = projection.invert([svgX, svgY]);
      if (!coords || isNaN(coords[0]) || isNaN(coords[1])) return;
      const hit = datasetFeatures().find(f => d3.geoContains(f, coords));
      if (!hit) return;

      revealing = true;
      promptCard.classList.add("revealing");
      revealLayer.selectAll("path").remove();
      // Clicked country
      revealLayer.append("path")
        .attr("class", "reveal-clicked")
        .datum(hit)
        .attr("d", path);
      // If they missed, also reveal the correct country
      if (hit !== target) {
        revealLayer.append("path")
          .attr("class", "reveal-correct")
          .datum(target)
          .attr("d", path);
      }
      showInfo("You clicked", hit);

      setTimeout(() => {
        revealLayer.selectAll("path").remove();
        promptCard.classList.remove("revealing");
        revealing = false;
        nextTarget();
      }, REVEAL_MS);
    }

    // ---- Info mode (hover / reticle) ----
    let infoPos = null;          // last pointer position over the svg, or null
    let pointerOverSvg = false;
    let lastInfoHit = null;

    function showInfoHighlight(feature) {
      if (lastInfoHit === feature) {
        revealLayer.selectAll(".info-hit").attr("d", path);
        return;
      }
      lastInfoHit = feature;
      revealLayer.selectAll(".info-hit").remove();
      if (feature) {
        revealLayer.append("path")
          .attr("class", "info-hit")
          .datum(feature)
          .attr("d", path);
      }
    }

    function showInfoDefault() {
      if (mode === "info" || mode === "show-all") {
        promptCard.classList.add("hidden-card");
      }
    }

    function updateInfoAt(pos) {
      if (mode !== "info" && mode !== "show-all") return;
      const coords = projection.invert(pos);
      if (!coords || isNaN(coords[0]) || isNaN(coords[1])) {
        showInfoDefault();
        showInfoHighlight(null);
        return;
      }
      const hit = datasetFeatures().find(f => d3.geoContains(f, coords));
      if (hit) {
        showInfo("Info", hit);
        showInfoHighlight(hit);
      } else {
        showInfoDefault();
        showInfoHighlight(null);
      }
    }

    function updateInfo() {
      if (mode !== "info" && mode !== "show-all") return;
      if (IS_TOUCH) {
        updateInfoAt([width / 2, height / 2]);
      } else if (pointerOverSvg && infoPos) {
        updateInfoAt(infoPos);
      } else {
        showInfoDefault();
        showInfoHighlight(null);
      }
    }

    svgEl.addEventListener("pointermove", (event) => {
      if (mode !== "info" && mode !== "show-all") return;
      if (event.pointerType === "touch") return;
      const [x, y] = d3.pointer(event, svgEl);
      infoPos = [x, y];
      pointerOverSvg = true;
      updateInfo();
    });
    svgEl.addEventListener("pointerenter", (event) => {
      if (event.pointerType === "touch") return;
      pointerOverSvg = true;
    });
    svgEl.addEventListener("pointerleave", (event) => {
      if (event.pointerType === "touch") return;
      pointerOverSvg = false;
      if (mode === "info" || mode === "show-all") updateInfo();
    });

    // ---- Tour mode ----
    function startTour() {
      tourBag = [];
      tourTick();
    }
    function stopTour() {
      if (tourTimer) clearTimeout(tourTimer);
      tourTimer = null;
      revealLayer.selectAll("path").remove();
    }
    function tourTick() {
      const tourPool = filteredPool();
      if (tourPool.length === 0) {
        revealLayer.selectAll("path").remove();
        showEmpty("Tour", "No regions selected");
        return;
      }
      if (tourBag.length === 0) {
        tourBag = tourPool.slice();
        for (let i = tourBag.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [tourBag[i], tourBag[j]] = [tourBag[j], tourBag[i]];
        }
      }
      const feature = tourBag.shift();
      const c = d3.geoCentroid(feature);
      if (!isNaN(c[0]) && !isNaN(c[1])) {
        animateTo([-c[0], -c[1]], projection.scale());
      }
      revealLayer.selectAll("path").remove();
      revealLayer.append("path")
        .datum(feature)
        .attr("d", path)
        .attr("fill", "rgba(120, 220, 255, 0.22)")
        .attr("stroke", "#7ec4ff")
        .attr("stroke-width", 1.5)
        .attr("stroke-linejoin", "round");
      showInfo("Tour", feature);
      tourTimer = setTimeout(tourTick, TOUR_INTERVAL_MS);
    }

    // ---- Keyboard (continuous) ----
    const KEY_MAP = {
      "w": "up", "W": "up", "ArrowUp": "up",
      "s": "down", "S": "down", "ArrowDown": "down",
      "a": "left", "A": "left", "ArrowLeft": "left",
      "d": "right", "D": "right", "ArrowRight": "right",
      "+": "zoomin", "=": "zoomin",
      "-": "zoomout", "_": "zoomout",
    };
    const heldActions = new Set();
    let animActive = false;
    let lastFrameT = 0;
    let invertH = true;
    let invertV = true;

    function isTypingTarget(t) {
      if (!t) return false;
      const tag = t.tagName;
      return tag === "INPUT" || tag === "SELECT" || tag === "TEXTAREA" || t.isContentEditable;
    }

    window.addEventListener("keydown", (e) => {
      if (isTypingTarget(e.target)) return;
      if (e.key === "0") {
        e.preventDefault();
        const entry = datasets.get(dataset);
        const view = (entry && entry.view) || { rotate: ROTATE_DEFAULT, scale: initialScale };
        animateTo(view.rotate, view.scale);
        return;
      }
      const action = KEY_MAP[e.key];
      if (!action) return;
      e.preventDefault();
      if (!heldActions.has(action)) {
        heldActions.add(action);
        if (!animActive) {
          animActive = true;
          lastFrameT = 0;
          requestAnimationFrame(keyFrame);
        }
      }
    });
    window.addEventListener("keyup", (e) => {
      const action = KEY_MAP[e.key];
      if (action) heldActions.delete(action);
    });
    window.addEventListener("blur", () => heldActions.clear());

    function keyFrame(t) {
      if (heldActions.size === 0) {
        animActive = false;
        lastFrameT = 0;
        return;
      }
      if (!lastFrameT) lastFrameT = t;
      const dt = Math.min(0.1, (t - lastFrameT) / 1000);
      lastFrameT = t;

      // Rotation: deg/sec scaled down as we zoom in (smaller features → smaller motion)
      const rotDeg = KEY_ROTATE_DEG_PER_SEC * dt * (initialScale / projection.scale());
      const hSign = invertH ? -1 : 1;
      const vSign = invertV ? -1 : 1;
      const r = projection.rotate();
      let dλ = 0, dφ = 0;
      if (heldActions.has("left")) dλ -= rotDeg * hSign;
      if (heldActions.has("right")) dλ += rotDeg * hSign;
      if (heldActions.has("up")) dφ += rotDeg * vSign;
      if (heldActions.has("down")) dφ -= rotDeg * vSign;
      if (dλ || dφ) {
        projection.rotate([r[0] + dλ, Math.max(-90, Math.min(90, r[1] + dφ))]);
      }

      // Zoom
      let zf = 1;
      if (heldActions.has("zoomin")) zf *= Math.pow(KEY_ZOOM_PER_SEC, dt);
      if (heldActions.has("zoomout")) zf /= Math.pow(KEY_ZOOM_PER_SEC, dt);
      if (zf !== 1) projection.scale(clampScale(projection.scale() * zf));

      render();
      if (mode === "info" || mode === "show-all") updateInfo();
      requestAnimationFrame(keyFrame);
    }

    // ---- Settings panel ----
    const panel = document.getElementById("settings-panel");
    document.getElementById("settings-btn").addEventListener("click", () => {
      const open = panel.classList.toggle("open");
      panel.setAttribute("aria-hidden", open ? "false" : "true");
    });
    document.getElementById("close-settings").addEventListener("click", () => {
      panel.classList.remove("open");
      panel.setAttribute("aria-hidden", "true");
    });

    // ---- Mode / dataset buttons ----
    document.querySelectorAll(".mode-tab").forEach(btn => {
      btn.addEventListener("click", () => {
        const action = btn.dataset.action;
        if (action === "info" || action === "tour" || action === "show-all") {
          setMode(mode === action ? "quiz" : action);
        }
      });
    });

    datasetSelect.addEventListener("change", (e) => {
      setDataset(e.target.value);
    });

    async function setDataset(newDataset) {
      if (dataset === newDataset) return;
      const entry = datasets.get(newDataset);
      if (!entry) return;
      const prev = dataset;
      if (!entry.ready) {
        promptLabel.textContent = "Loading";
        promptName.textContent = entry.label;
        promptMeta.textContent = "…";
        try {
          await entry.load();
        } catch (err) {
          console.error("Dataset load failed:", err);
          promptLabel.textContent = "Error";
          promptName.textContent = `Failed to load ${entry.label}`;
          promptMeta.textContent = (err && err.message) || "Check your connection and try again.";
          datasetSelect.value = prev;
          return;
        }
      }
      dataset = newDataset;
      updateButtonHighlights();
      applyModeUI();
      animateTo(entry.view.rotate, entry.view.scale);
      lastInfoHit = null;
      if (mode === "quiz") rebuildPool();
      else if (mode === "tour") { stopTour(); startTour(); }
      else if (mode === "info") updateInfo();
      else if (mode === "show-all") { drawShowAll(); updateInfo(); }
    }

    function setMode(newMode) {
      if (mode === newMode) return;
      const prev = mode;
      mode = newMode;
      updateButtonHighlights();
      applyModeUI();
      if (prev === "tour") stopTour();
      if (prev === "show-all") bordersLayer.selectAll("path").remove();
      lastInfoHit = null;
      revealLayer.selectAll("path").remove();
      promptCard.classList.remove("revealing");
      promptCard.classList.remove("hidden-card");
      revealing = false;
      target = null;
      if (mode === "info") updateInfo();
      else if (mode === "tour") startTour();
      else if (mode === "show-all") { drawShowAll(); updateInfo(); }
      else if (mode === "quiz") rebuildPool();
    }

    function drawShowAll() {
      bordersLayer.selectAll("path").remove();
      const entry = datasets.get(dataset);
      const datum = entry?.borderMesh || entry?.borderCollection;
      if (datum) {
        bordersLayer.append("path")
          .datum(datum)
          .attr("d", path)
          .attr("fill", "none")
          .attr("stroke", "rgba(220, 240, 230, 0.75)")
          .attr("stroke-width", 0.7)
          .attr("stroke-linejoin", "round");
      }
      showInfoDefault();
    }

    function updateButtonHighlights() {
      document.querySelectorAll(".mode-tab").forEach(b => b.classList.remove("active"));
      datasetSelect.value = dataset;
      if (mode === "info" || mode === "tour" || mode === "show-all") {
        const mBtn = document.querySelector(`.mode-tab[data-action="${mode}"]`);
        if (mBtn) mBtn.classList.add("active");
      }
    }

    function applyModeUI() {
      const hoverMode = mode === "info" || mode === "show-all";
      svgEl.classList.toggle("info-mode", hoverMode);
      document.body.classList.toggle("hover-mode", hoverMode);
      reticle.style("display", (hoverMode && IS_TOUCH) ? null : "none");
      promptCard.classList.toggle("info", mode === "info");
      promptCard.classList.toggle("tour", mode === "tour");
      promptCard.classList.toggle("show-all", mode === "show-all");
    }

    function animateTo(targetRotate, targetScale) {
      const startRotate = projection.rotate();
      const startScale = projection.scale();
      let lonDiff = targetRotate[0] - startRotate[0];
      while (lonDiff > 180) lonDiff -= 360;
      while (lonDiff < -180) lonDiff += 360;
      const latDiff = targetRotate[1] - startRotate[1];
      const scaleDiff = targetScale - startScale;
      const duration = 800;
      const t0 = performance.now();
      function step(now) {
        const t = Math.min(1, (now - t0) / duration);
        const e = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
        projection.rotate([startRotate[0] + lonDiff * e, startRotate[1] + latDiff * e]);
        projection.scale(startScale + scaleDiff * e);
        render();
        if (mode === "info" || mode === "show-all") updateInfo();
        if (t < 1) requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    }

    // ---- Resize ----
    window.addEventListener("resize", () => {
      width = window.innerWidth;
      height = window.innerHeight;
      svg.attr("width", width).attr("height", height);
      projection.translate([width / 2, height / 2]);
      positionReticle();
      render();
      if (mode === "info") updateInfo();
    });

    // ---- Color settings ----
    function withAlpha(hex, alpha) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return `rgba(${r},${g},${b},${alpha})`;
    }
    document.getElementById("bg-color").addEventListener("input", (e) => {
      document.body.style.background = e.target.value;
    });
    function bindLayerColor(inputId, varName, alpha) {
      document.getElementById(inputId).addEventListener("input", (e) => {
        const hex = e.target.value;
        document.documentElement.style.setProperty(varName, hex);
        if (alpha !== undefined) {
          document.documentElement.style.setProperty(varName + "-alpha", withAlpha(hex, alpha));
        }
      });
    }
    // Land/Ocean/Rivers are simple fills/strokes — set the var directly.
    document.getElementById("land-color").addEventListener("input", (e) => {
      document.documentElement.style.setProperty("--land", e.target.value);
    });
    document.getElementById("ocean-color").addEventListener("input", (e) => {
      document.documentElement.style.setProperty("--ocean", e.target.value);
      document.documentElement.style.setProperty("--ocean-stroke", withAlpha(e.target.value, 0.25));
    });
    document.getElementById("river-color").addEventListener("input", (e) => {
      document.documentElement.style.setProperty("--rivers", e.target.value);
    });
    // Highlight / clicked / correct: set stroke directly + a translucent fill derived from it.
    function bindHighlightColor(inputId, strokeVar, fillVar, alpha) {
      document.getElementById(inputId).addEventListener("input", (e) => {
        document.documentElement.style.setProperty(strokeVar, e.target.value);
        document.documentElement.style.setProperty(fillVar, withAlpha(e.target.value, alpha));
      });
    }
    bindHighlightColor("highlight-color", "--hl-stroke", "--hl-fill", 0.22);
    bindHighlightColor("clicked-color", "--clicked-stroke", "--clicked-fill", 0.28);
    bindHighlightColor("correct-color", "--correct-stroke", "--correct-fill", 0.22);

    // Color scheme presets
    const COLOR_SCHEMES = {
      classic:   { bg: "#050912", land: "#3d6b48", ocean: "#16335a", rivers: "#78aae6",
                   highlight: "#7ec8ff", clicked: "#ffd54a", correct: "#7adba0" },
      daylight:  { bg: "#e8e4d8", land: "#c9b88c", ocean: "#b9d6e8", rivers: "#4a7eb3",
                   highlight: "#2d6cb0", clicked: "#d4861c", correct: "#4a9d5c" },
      parchment: { bg: "#2a1f15", land: "#d4a373", ocean: "#3a4a5c", rivers: "#6a8aa8",
                   highlight: "#c9a017", clicked: "#b03020", correct: "#6a8e3a" },
      neon:      { bg: "#0a0014", land: "#143a3a", ocean: "#0d1a3a", rivers: "#1bd0ff",
                   highlight: "#ff2dc8", clicked: "#f5e02b", correct: "#2bff7c" },
      mono:      { bg: "#0d0d0d", land: "#4a4a4a", ocean: "#1f1f1f", rivers: "#8a8a8a",
                   highlight: "#ffffff", clicked: "#e0e0e0", correct: "#909090" },
      sunset:    { bg: "#1f0d18", land: "#8b4a3a", ocean: "#3a2433", rivers: "#e89358",
                   highlight: "#ffd1a3", clicked: "#ffe45c", correct: "#ff7d5a" },
    };

    function applyScheme(name) {
      const s = COLOR_SCHEMES[name];
      if (!s) return;
      document.body.style.background = s.bg;
      document.getElementById("bg-color").value = s.bg;
      const root = document.documentElement.style;
      root.setProperty("--land", s.land);
      document.getElementById("land-color").value = s.land;
      root.setProperty("--ocean", s.ocean);
      root.setProperty("--ocean-stroke", withAlpha(s.ocean, 0.25));
      document.getElementById("ocean-color").value = s.ocean;
      root.setProperty("--rivers", s.rivers);
      document.getElementById("river-color").value = s.rivers;
      root.setProperty("--hl-stroke", s.highlight);
      root.setProperty("--hl-fill", withAlpha(s.highlight, 0.22));
      document.getElementById("highlight-color").value = s.highlight;
      root.setProperty("--clicked-stroke", s.clicked);
      root.setProperty("--clicked-fill", withAlpha(s.clicked, 0.28));
      document.getElementById("clicked-color").value = s.clicked;
      root.setProperty("--correct-stroke", s.correct);
      root.setProperty("--correct-fill", withAlpha(s.correct, 0.22));
      document.getElementById("correct-color").value = s.correct;
    }

    document.querySelectorAll(".scheme-btn").forEach(btn => {
      btn.addEventListener("click", () => applyScheme(btn.dataset.scheme));
    });

    // ---- Visibility toggles ----
    document.getElementById("rivers-toggle").addEventListener("change", (e) => {
      riversPath.style("display", e.target.checked ? null : "none");
    });
    document.getElementById("water-grid-toggle").addEventListener("change", (e) => {
      graticulePath.style("display", e.target.checked ? null : "none");
    });
    document.getElementById("long-lat-toggle").addEventListener("change", (e) => {
      showLongLat = e.target.checked;
      longLatGridPath.style("display", showLongLat ? null : "none");
      longLatLabels.style("display", showLongLat ? null : "none");
      if (showLongLat) updateLongLatLabels();
    });

    // ---- Invert controls ----
    document.getElementById("invert-h").addEventListener("change", (e) => {
      invertH = e.target.checked;
    });
    document.getElementById("invert-v").addEventListener("change", (e) => {
      invertV = e.target.checked;
    });

    // ---- Find / autocomplete ----
    // Built lazily — countries are always indexed; subdivisions get
    // appended when their dataset is first loaded.
    const searchIndex = countryFeatures.map(f => ({
      label: f.properties.displayName, type: "country", feature: f,
    }));

    const findInput = document.getElementById("find-input");
    const findResults = document.getElementById("find-results");
    let currentMatches = [];
    let findIndex = -1;

    function computeMatches(query) {
      const q = query.trim().toLowerCase();
      if (!q) return [];
      return searchIndex
        .filter(item => item.label.toLowerCase().includes(q))
        .sort((a, b) => {
          const aStarts = a.label.toLowerCase().startsWith(q);
          const bStarts = b.label.toLowerCase().startsWith(q);
          if (aStarts !== bStarts) return aStarts ? -1 : 1;
          return a.label.localeCompare(b.label);
        })
        .slice(0, 10);
    }

    function renderFindResults() {
      findResults.innerHTML = "";
      if (currentMatches.length === 0) {
        findResults.hidden = true;
        findIndex = -1;
        return;
      }
      findResults.hidden = false;
      currentMatches.forEach((item, i) => {
        const li = document.createElement("li");
        if (i === findIndex) li.classList.add("active");
        const flag = document.createElement("span");
        flag.textContent = item.feature.properties.flag || "";
        const name = document.createElement("span");
        name.className = "find-name";
        name.textContent = item.label;
        const badge = document.createElement("span");
        badge.className = "type-badge";
        badge.textContent = item.type;
        li.appendChild(flag);
        li.appendChild(name);
        li.appendChild(badge);
        li.addEventListener("mousedown", (e) => {
          e.preventDefault();
          selectFindItem(item);
        });
        findResults.appendChild(li);
      });
    }

    function selectFindItem(item) {
      findInput.value = "";
      currentMatches = [];
      findIndex = -1;
      findResults.hidden = true;
      findResults.innerHTML = "";

      const c = d3.geoCentroid(item.feature);
      if (!isNaN(c[0]) && !isNaN(c[1])) {
        animateTo([-c[0], -c[1]], projection.scale());
      }
      revealLayer.selectAll("path").remove();
      revealLayer.append("path")
        .datum(item.feature)
        .attr("d", path)
        .attr("fill", "rgba(180, 140, 255, 0.22)")
        .attr("stroke", "#bf94ff")
        .attr("stroke-width", 1.5)
        .attr("stroke-linejoin", "round");
      showInfo("Found", item.feature);
      if (mode === "info") lastInfoHit = null;
    }

    findInput.addEventListener("input", (e) => {
      currentMatches = computeMatches(e.target.value);
      findIndex = currentMatches.length > 0 ? 0 : -1;
      renderFindResults();
    });

    findInput.addEventListener("keydown", (e) => {
      if (e.key === "ArrowDown") {
        if (currentMatches.length === 0) return;
        e.preventDefault();
        findIndex = (findIndex + 1) % currentMatches.length;
        renderFindResults();
        const active = findResults.querySelector("li.active");
        if (active) active.scrollIntoView({ block: "nearest" });
      } else if (e.key === "ArrowUp") {
        if (currentMatches.length === 0) return;
        e.preventDefault();
        findIndex = (findIndex - 1 + currentMatches.length) % currentMatches.length;
        renderFindResults();
        const active = findResults.querySelector("li.active");
        if (active) active.scrollIntoView({ block: "nearest" });
      } else if (e.key === "Enter") {
        if (findIndex >= 0 && currentMatches[findIndex]) {
          e.preventDefault();
          selectFindItem(currentMatches[findIndex]);
          findInput.blur();
        }
      } else if (e.key === "Escape") {
        e.preventDefault();
        findInput.value = "";
        currentMatches = [];
        findIndex = -1;
        renderFindResults();
        findInput.blur();
      }
    });

    document.addEventListener("click", (e) => {
      if (!findInput.contains(e.target) && !findResults.contains(e.target)) {
        findResults.hidden = true;
      }
    });

    // ---- Boot ----
    updateButtonHighlights();
    applyModeUI();
    rebuildPool();
  })().catch(err => {
    console.error(err);
    const loading = document.getElementById("loading");
    if (loading) loading.textContent = "Failed to load data. Check your network and reload.";
  });
  </script>
</body>
</html>
